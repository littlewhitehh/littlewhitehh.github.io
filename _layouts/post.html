---
layout: default
---

<article class="post-page">
  <header class="post-hero">
    <p class="post-meta">{{ page.date | date: "%Y.%m.%d" }} · {{ page.category }}</p>
    <h1>{{ page.title }}</h1>
    <p>{{ page.excerpt }}</p>
  </header>
  <section class="post-content">
    {{ content }}
  </section>
</article>
