<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>个人博客</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <img src="1.png" alt="头像" class="avatar">
    <h1 class="title">星绘日记</h1>
    <p class="subtitle">记录插画、灵感和季节心情的小角落，为 GitHub Pages 准备的温柔动漫风主页。</p>
    <div class="ribbon">最新更新：春日随笔</div>
  </header>

  <main>
    <section class="card">
      <h3>关于我</h3>
      <p>喜欢用色彩记录故事，也热衷收集温柔日常。</p>
    </section>
    <section class="card">
      <h3>最近文章</h3>
      <p>樱花小径：穿过粉色街道与细雨的安静散步。</p>
    </section>
    <section class="card">
      <h3>灵感画廊</h3>
      <p>速写、拼贴与日常灵感的轻量集锦。</p>
    </section>
    <section class="card">
      <h3>联系我</h3>
      <p>欢迎通过社交账号打招呼，或在留言板留下你的话。</p>
    </section>
  </main>

  <footer>
    由 GitHub Pages 驱动。
  </footer>
</body>
</html>
